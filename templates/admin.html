<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 패널 — LOTTO ANALYZER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #c9d1d9;
            padding: 32px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        h1 { font-size: 1.3rem; color: #f0f6fc; font-weight: 600; }
        .badge {
            background: rgba(35,134,54,0.2);
            border: 1px solid rgba(35,134,54,0.4);
            border-radius: 20px;
            color: #3fb950;
            font-size: 0.8rem;
            padding: 4px 12px;
            margin-left: 12px;
        }
        .logout { color: #8b949e; font-size: 0.85rem; text-decoration: none; }
        .logout:hover { color: #f85149; }
        .grid { display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
        .card {
            background: rgba(22,27,34,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 28px;
            backdrop-filter: blur(12px);
        }
        .card h2 { font-size: 1rem; color: #f0f6fc; margin-bottom: 20px; font-weight: 500; }
        label { display: block; font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        input[type="text"] {
            width: 100%;
            background: rgba(13,17,23,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 0.9rem;
            padding: 9px 12px;
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.15s;
        }
        input[type="text"]:focus { border-color: rgba(88,166,255,0.5); }
        button {
            width: 100%;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 10px;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #2ea043; }
        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            display: none;
        }
        .result.success {
            background: rgba(35,134,54,0.1);
            border: 1px solid rgba(35,134,54,0.3);
            color: #3fb950;
        }
        .result.error {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.3);
            color: #f85149;
        }
        .key-text {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            font-size: 0.75rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 12px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        td {
            font-size: 0.85rem;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            vertical-align: top;
        }
        td.key-cell {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.8rem;
            color: #79c0ff;
            cursor: pointer;
        }
        .empty { color: #8b949e; font-size: 0.85rem; text-align: center; padding: 32px; }
        .copy-hint { font-size: 0.7rem; color: #8b949e; margin-top: 4px; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1 style="display:inline">관리자 패널</h1>
            <span class="badge">{{ keys|length }}개 발급됨</span>
        </div>
        <a href="/admin/logout" class="logout">로그아웃</a>
    </header>

    <div class="grid">
        <!-- Key Generation Form -->
        <div class="card">
            <h2>라이선스 키 생성</h2>
            <label>주문번호</label>
            <input type="text" id="orderId" placeholder="예: KMONG-20240101-001" autocomplete="off">
            <label>메모 (선택)</label>
            <input type="text" id="note" placeholder="구매자명 등">
            <button onclick="generateKey()">키 생성</button>
            <div class="result" id="result"></div>
        </div>

        <!-- Issued Keys Table -->
        <div class="card">
            <h2>발급 이력</h2>
            {% if keys %}
            <table>
                <thead>
                    <tr>
                        <th>라이선스 키</th>
                        <th>주문번호</th>
                        <th>발급일</th>
                        <th>메모</th>
                    </tr>
                </thead>
                <tbody>
                {% for k in keys %}
                <tr>
                    <td class="key-cell" onclick="copyKey('{{ k.key }}')" title="클릭하여 복사">{{ k.key }}</td>
                    <td>{{ k.order_id }}</td>
                    <td>{{ k.issued_at[:10] }}</td>
                    <td>{{ k.note or '—' }}</td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
            {% else %}
            <div class="empty">아직 발급된 키가 없습니다</div>
            {% endif %}
        </div>
    </div>

    <script>
        async function generateKey() {
            const orderId = document.getElementById('orderId').value.trim();
            const note = document.getElementById('note').value.trim();
            const resultEl = document.getElementById('result');

            if (!orderId) {
                resultEl.textContent = '주문번호를 입력해주세요.';
                resultEl.className = 'result error';
                resultEl.style.display = 'block';
                return;
            }

            let r, d;
            try {
                r = await fetch('/api/admin/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId, note })
                });
                d = await r.json();
            } catch {
                resultEl.textContent = '오류가 발생했습니다.';
                resultEl.className = 'result error';
                resultEl.style.display = 'block';
                return;
            }

            if (r.ok && d.key) {
                resultEl.innerHTML = `
                    <div class="key-text" onclick="copyKey('${d.key}')">${d.key}</div>
                    <div class="copy-hint">클릭하여 복사 · 페이지를 새로고침하면 이력에 표시됩니다</div>
                `;
                resultEl.className = 'result success';
                resultEl.style.display = 'block';
                document.getElementById('orderId').value = '';
                document.getElementById('note').value = '';
            } else {
                resultEl.textContent = d.error || '오류가 발생했습니다.';
                resultEl.className = 'result error';
                resultEl.style.display = 'block';
            }
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key).then(() => {
                alert('복사됨: ' + key);
            });
        }

        document.getElementById('orderId').addEventListener('keydown', e => {
            if (e.key === 'Enter') generateKey();
        });
    </script>
</body>
</html>
